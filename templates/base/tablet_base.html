<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>{% block title %}{{ request.tenant.name }} - POS System{% endblock %}</title>
    
    <!-- Favicon -->
    {% if request.tenant.logo %}
    <link rel="icon" href="{{ request.tenant.logo.url }}">
    {% endif %}
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tablet-specific styles -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/tablet-base.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="tablet-layout">
    <!-- Loading Spinner -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p>Loading...</p>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 11;">
        <div class="toast" id="toastNotification" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <i class="toast-icon fas fa-info-circle me-2"></i>
                <strong class="me-auto">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                <!-- Toast message will be inserted here -->
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="tablet-footer">
        <div class="footer-content">
            <div class="footer-left">
                <span class="footer-text">{{ request.tenant.name }} POS System</span>
            </div>
            <div class="footer-center">
                <span class="current-time" id="currentTime"></span>
            </div>
            <div class="footer-right">
                <span class="connection-status" id="connectionStatus">
                    <i class="fas fa-wifi text-success"></i>
                    Online
                </span>
            </div>
        </div>
    </footer>
    
    <!-- Scripts -->
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Common tablet scripts -->
    <script src="{% static 'js/tablet-base.js' %}"></script>
    
    {% block extra_js %}{% endblock %}
    
    <script>
        // Initialize tablet-specific functionality
        document.addEventListener('DOMContentLoaded', function() {
            TabletBase.init();
        });
    </script>
</body>
</html>
